name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            app/requirements.txt
            training/requirements.txt
            pipeline/requirements.txt
            scripts/requirements.txt
            tests/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install -r training/requirements.txt
          pip install -r pipeline/requirements.txt
          pip install -r scripts/requirements.txt
          pip install -r tests/requirements.txt
          pip install pylint mypy

      - name: Run tests
        run: pytest tests/ -v

      - name: Run pylint
        run: pylint app/ training/ pipeline/ scripts/ tests/ --fail-under=7.0

      - name: Run mypy
        run: mypy app/ training/ pipeline/ scripts/ tests/ --ignore-missing-imports

  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Install security tools
        run: pip install pip-audit

      - name: Audit dependencies for known CVEs
        run: pip-audit -r app/requirements.txt

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

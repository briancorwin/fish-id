name: Deploy

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  deploy-api:
    name: Build & Deploy Cloud Run
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker

      - name: Download model from GCS
        run: gsutil cp ${{ secrets.ONNX_MODEL_GCS_URI }} app/best.onnx

      - name: Build and push Docker image
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/fish-id:${{ github.sha }} app/
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/fish-id:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy fish-id \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/fish-id:${{ github.sha }} \
            --region ${{ secrets.GCP_REGION }} \
            --memory 2Gi \
            --cpu 2 \
            --concurrency 5 \
            --max-instances 1 \
            --service-account fish-id-cloud-run-sa@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --allow-unauthenticated

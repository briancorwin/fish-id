name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Training run ID for Cloud Run revision tagging (optional)'
        required: false
        type: string

jobs:
  deploy-api:
    name: Build & Deploy Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev

      - name: Download model from Vertex AI Registry
        run: |
          MODEL=$(gcloud ai models list \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --region="${{ secrets.GCP_REGION }}" \
            --filter='displayName="fish-id"' \
            --format='value(name)' \
            --limit=1)
          if [ -z "$MODEL" ]; then
            echo "::error::fish-id model not found in Vertex AI Model Registry"
            exit 1
          fi
          ARTIFACT_URI=$(gcloud ai models list-versions "$MODEL" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --region="${{ secrets.GCP_REGION }}" \
            --filter='versionAliases:production' \
            --format='value(artifactUri)' \
            --limit=1)
          if [ -z "$ARTIFACT_URI" ]; then
            echo "::error::No version with 'production' alias found for fish-id"
            exit 1
          fi
          gsutil cp "${ARTIFACT_URI%/}/fish-id.onnx" app/fish-id.onnx

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/fish-id/fish-id:${{ github.sha }} app/
          docker push ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/fish-id/fish-id:${{ github.sha }}

      - name: Deploy to Cloud Run
        env:
          RUN_ID: ${{ inputs.run_id }}
        run: |
          REVISION_SUFFIX_FLAG=""
          if [ -n "$RUN_ID" ]; then
            REVISION_SUFFIX_FLAG="--revision-suffix=$RUN_ID"
          fi
          gcloud run deploy fish-id \
            --image ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/fish-id/fish-id:${{ github.sha }} \
            --region ${{ secrets.GCP_REGION }} \
            --memory 2Gi \
            --cpu 2 \
            --concurrency 5 \
            --max-instances 1 \
            --service-account fish-id-cloud-run-sa@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars CORS_ORIGIN=https://${{ secrets.GCP_PROJECT_ID }}.web.app \
            --allow-unauthenticated \
            $REVISION_SUFFIX_FLAG

  deploy-frontend:
    name: Deploy Firebase Hosting
    runs-on: ubuntu-latest
    needs: deploy-api
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Get Cloud Run URL
        id: cloud-run-url
        run: |
          URL=$(gcloud run services describe fish-id \
            --region ${{ secrets.GCP_REGION }} \
            --format 'value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Inject Cloud Run URL into frontend
        run: |
          sed -i "s|https://YOUR_CLOUD_RUN_URL|${{ steps.cloud-run-url.outputs.url }}|g" \
            frontend/public/js/app.js

      - name: Set Firebase project
        run: |
          sed -i "s/GCP_PROJECT_ID/${{ secrets.GCP_PROJECT_ID }}/g" \
            frontend/.firebaserc

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools@latest deploy --only hosting --project ${{ secrets.GCP_PROJECT_ID }} --non-interactive
        working-directory: frontend

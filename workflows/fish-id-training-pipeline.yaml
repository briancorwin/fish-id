main:
  params: [args]
  steps:

    # -------------------------------------------------------------------------
    # Step 0: Init — resolve trigger mode, parse args, read training image URI
    # -------------------------------------------------------------------------
    - init:
        assign:
          - project_id: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
          - region: "us-central1"
          - training_bucket: ${project_id + "-fish-id-training"}
          - model_bucket: ${project_id + "-fish-id-models"}
          - vertex_experiment: "fish-id-eval"
          - machine_type: "n1-standard-4"
          - now_str: ${text.substring(time.format(sys.now()), 0, 19)}
          - run_id: ${"run-" + text.replace_all(text.replace_all(now_str, "T", "-"), ":", "")}

    - check_trigger_mode:
        switch:
          - condition: ${"data" in args}
            next: parse_eventarc_args
        next: parse_manual_args

    # Eventarc path — args.data.name is the GCS object path
    - parse_eventarc_args:
        assign:
          - gcs_object: ${args.data.name}
          - dataset_version: ${text.split(gcs_object, "/")[1]}
          - config_version: "1"
        next: check_object_name

    - check_object_name:
        switch:
          - condition: ${not(text.match_regex(gcs_object, "^versions/[^/]+/manifest\\.json$"))}
            return:
              status: "skipped"
              reason: "not a versioned manifest — ignoring"
              object: ${gcs_object}

    - read_training_image:
        call: http.get
        args:
          url: ${"https://storage.googleapis.com/storage/v1/b/" + model_bucket + "/o/training-image-latest.json?alt=media"}
          auth:
            type: OAuth2
        result: training_image_response

    - parse_training_image:
        assign:
          - training_image: ${training_image_response.body.image}
        next: submit_training_job

    # Manual path — dataset_version, config_version, and image passed directly
    - parse_manual_args:
        assign:
          - dataset_version: ${args.dataset_version}
          - config_version: ${args.config_version}
          - training_image: ${args.image}

    # -------------------------------------------------------------------------
    # Step 1: Submit training CustomJob
    # -------------------------------------------------------------------------
    - submit_training_job:
        call: http.post
        args:
          url: ${"https://" + region + "-aiplatform.googleapis.com/v1/projects/" + project_id + "/locations/" + region + "/customJobs"}
          auth:
            type: OAuth2
          body:
            displayName: ${"fish-id-train-" + run_id}
            jobSpec:
              workerPoolSpecs:
                - machineSpec:
                    machineType: "n1-standard-4"
                    acceleratorType: "NVIDIA_TESLA_T4"
                    acceleratorCount: 1
                  replicaCount: 1
                  containerSpec:
                    imageUri: ${training_image}
                    env:
                      - name: "JOB_MODE"
                        value: "train"
                      - name: "RUN_ID"
                        value: ${run_id}
                      - name: "DATASET_VERSION"
                        value: ${dataset_version}
                      - name: "CONFIG_VERSION"
                        value: ${config_version}
                      - name: "TRAINING_BUCKET"
                        value: ${training_bucket}
                      - name: "MODEL_BUCKET"
                        value: ${model_bucket}
                      - name: "GCP_PROJECT_ID"
                        value: ${project_id}
                      - name: "GCP_REGION"
                        value: ${region}
                      - name: "VERTEX_EXPERIMENT"
                        value: ${vertex_experiment}
                      - name: "CONTAINER_IMAGE"
                        value: ${training_image}
                      - name: "MACHINE_TYPE"
                        value: ${machine_type}
              scheduling:
                timeout: "7200s"
              serviceAccount: ${"fish-id-training-sa@" + project_id + ".iam.gserviceaccount.com"}
        result: training_job_response

    - store_training_job_name:
        assign:
          - training_job_name: ${training_job_response.body.name}

    # -------------------------------------------------------------------------
    # Step 2: Poll training job
    # -------------------------------------------------------------------------
    - poll_training_sleep:
        call: sys.sleep
        args:
          seconds: 30

    - poll_training_get:
        call: http.get
        args:
          url: ${"https://" + region + "-aiplatform.googleapis.com/v1/" + training_job_name}
          auth:
            type: OAuth2
        result: training_poll_response

    - check_training_state:
        switch:
          - condition: ${training_poll_response.body.state == "JOB_STATE_SUCCEEDED"}
            next: submit_eval_job
          - condition: ${training_poll_response.body.state == "JOB_STATE_QUEUED" or training_poll_response.body.state == "JOB_STATE_PENDING" or training_poll_response.body.state == "JOB_STATE_RUNNING" or training_poll_response.body.state == "JOB_STATE_CANCELLING" or training_poll_response.body.state == "JOB_STATE_UPDATING" or training_poll_response.body.state == "JOB_STATE_PAUSED"}
            next: poll_training_sleep
        next: write_training_failure

    - write_training_failure:
        call: http.post
        args:
          url: ${"https://storage.googleapis.com/upload/storage/v1/b/" + model_bucket + "/o?uploadType=media&name=runs%2F" + run_id + "%2Fgate_failure.json"}
          auth:
            type: OAuth2
          headers:
            Content-Type: "application/json"
          body:
            gate_failed: "training_job"
            run_id: ${run_id}
            job_state: ${training_poll_response.body.state}
            timestamp: ${sys.now()}
        result: _write_training_failure_result

    - raise_training_failure:
        raise:
          code: 500
          message: '${"Training job failed or was cancelled. State: " + training_poll_response.body.state + ". Run: " + run_id}'

    # -------------------------------------------------------------------------
    # Step 3: Submit eval CustomJob
    # -------------------------------------------------------------------------
    - submit_eval_job:
        call: http.post
        args:
          url: ${"https://" + region + "-aiplatform.googleapis.com/v1/projects/" + project_id + "/locations/" + region + "/customJobs"}
          auth:
            type: OAuth2
          body:
            displayName: ${"fish-id-eval-" + run_id}
            jobSpec:
              workerPoolSpecs:
                - machineSpec:
                    machineType: "n1-highmem-4"
                  replicaCount: 1
                  containerSpec:
                    imageUri: ${training_image}
                    env:
                      - name: "JOB_MODE"
                        value: "eval"
                      - name: "RUN_ID"
                        value: ${run_id}
                      - name: "DATASET_VERSION"
                        value: ${dataset_version}
                      - name: "CONFIG_VERSION"
                        value: ${config_version}
                      - name: "TRAINING_BUCKET"
                        value: ${training_bucket}
                      - name: "MODEL_BUCKET"
                        value: ${model_bucket}
                      - name: "GCP_PROJECT_ID"
                        value: ${project_id}
                      - name: "GCP_REGION"
                        value: ${region}
                      - name: "VERTEX_EXPERIMENT"
                        value: ${vertex_experiment}
                      - name: "CONTAINER_IMAGE"
                        value: ${training_image}
                      - name: "MACHINE_TYPE"
                        value: ${machine_type}
              scheduling:
                timeout: "7200s"
              serviceAccount: ${"fish-id-training-sa@" + project_id + ".iam.gserviceaccount.com"}
        result: eval_job_response

    - store_eval_job_name:
        assign:
          - eval_job_name: ${eval_job_response.body.name}

    # -------------------------------------------------------------------------
    # Step 3 (continued): Poll eval job
    # -------------------------------------------------------------------------
    - poll_eval_sleep:
        call: sys.sleep
        args:
          seconds: 30

    - poll_eval_get:
        call: http.get
        args:
          url: ${"https://" + region + "-aiplatform.googleapis.com/v1/" + eval_job_name}
          auth:
            type: OAuth2
        result: eval_poll_response

    - check_eval_state:
        switch:
          - condition: ${eval_poll_response.body.state == "JOB_STATE_SUCCEEDED"}
            next: read_eval_results
          - condition: ${eval_poll_response.body.state == "JOB_STATE_QUEUED" or eval_poll_response.body.state == "JOB_STATE_PENDING" or eval_poll_response.body.state == "JOB_STATE_RUNNING" or eval_poll_response.body.state == "JOB_STATE_CANCELLING" or eval_poll_response.body.state == "JOB_STATE_UPDATING" or eval_poll_response.body.state == "JOB_STATE_PAUSED"}
            next: poll_eval_sleep
        next: write_eval_failure

    - write_eval_failure:
        call: http.post
        args:
          url: ${"https://storage.googleapis.com/upload/storage/v1/b/" + model_bucket + "/o?uploadType=media&name=runs%2F" + run_id + "%2Fgate_failure.json"}
          auth:
            type: OAuth2
          headers:
            Content-Type: "application/json"
          body:
            gate_failed: "eval_job"
            run_id: ${run_id}
            job_state: ${eval_poll_response.body.state}
            timestamp: ${sys.now()}
        result: _write_eval_failure_result

    - raise_eval_failure:
        raise:
          code: 500
          message: '${"Eval job failed or was cancelled. State: " + eval_poll_response.body.state + ". Run: " + run_id}'

    # -------------------------------------------------------------------------
    # Step 4: Quality gate
    # -------------------------------------------------------------------------
    - read_eval_results:
        call: http.get
        args:
          url: ${"https://storage.googleapis.com/storage/v1/b/" + model_bucket + "/o/runs%2F" + run_id + "%2Feval_results.json?alt=media"}
          auth:
            type: OAuth2
        result: eval_results_response

    - parse_eval_results:
        assign:
          - eval_results: ${eval_results_response.body}

    - read_production_run:
        try:
          call: http.get
          args:
            url: ${"https://storage.googleapis.com/storage/v1/b/" + model_bucket + "/o/production-run.json?alt=media"}
            auth:
              type: OAuth2
          result: production_run_response
        except:
          as: e
          steps:
            - handle_missing_production_run:
                switch:
                  - condition: ${e.code == 404}
                    next: set_first_run_default
            - reraise_error:
                raise: ${e}
            - set_first_run_default:
                assign:
                  - production_run:
                      run_id: null
                      manual_override: true
                next: check_gate1_map50

    - parse_production_run:
        assign:
          - production_run: ${production_run_response.body}

    # Gate 1: Absolute floor checks
    - check_gate1_map50:
        switch:
          - condition: ${eval_results.mAP50 < 0.50}
            next: gate1_failure

    - check_gate1_map50_95:
        switch:
          - condition: ${eval_results.mAP50_95 < 0.35}
            next: gate1_failure

    - check_gate2_skip:
        switch:
          - condition: ${production_run.run_id == null or production_run.manual_override == true}
            next: promote_model

    # Gate 2: Regression check — read production eval results
    - read_prod_eval_results:
        call: http.get
        args:
          url: ${"https://storage.googleapis.com/storage/v1/b/" + model_bucket + "/o/runs%2F" + production_run.run_id + "%2Feval_results.json?alt=media"}
          auth:
            type: OAuth2
        result: prod_eval_results_response

    - parse_prod_eval_results:
        assign:
          - prod_eval_results: ${prod_eval_results_response.body}

    - check_gate2_regression:
        switch:
          - condition: ${eval_results.mAP50 < prod_eval_results.mAP50 - 0.02}
            next: gate2_failure

    - gates_passed:
        next: promote_model

    - gate1_failure:
        call: http.post
        args:
          url: ${"https://storage.googleapis.com/upload/storage/v1/b/" + model_bucket + "/o?uploadType=media&name=runs%2F" + run_id + "%2Fgate_failure.json"}
          auth:
            type: OAuth2
          headers:
            Content-Type: "application/json"
          body:
            gate_failed: "gate1_absolute_floor"
            metric_values:
              mAP50: ${eval_results.mAP50}
              mAP50_95: ${eval_results.mAP50_95}
            run_id: ${run_id}
            timestamp: ${sys.now()}
        result: _gate1_failure_write_result

    - return_gate1_failure:
        return:
          status: "gate_failure"
          gate: "gate1_absolute_floor"
          run_id: ${run_id}
          metric_values:
            mAP50: ${eval_results.mAP50}
            mAP50_95: ${eval_results.mAP50_95}

    - gate2_failure:
        call: http.post
        args:
          url: ${"https://storage.googleapis.com/upload/storage/v1/b/" + model_bucket + "/o?uploadType=media&name=runs%2F" + run_id + "%2Fgate_failure.json"}
          auth:
            type: OAuth2
          headers:
            Content-Type: "application/json"
          body:
            gate_failed: "gate2_regression"
            metric_values:
              mAP50: ${eval_results.mAP50}
              prod_mAP50: ${prod_eval_results.mAP50}
            run_id: ${run_id}
            timestamp: ${sys.now()}
        result: _gate2_failure_write_result

    - return_gate2_failure:
        return:
          status: "gate_failure"
          gate: "gate2_regression"
          run_id: ${run_id}
          metric_values:
            mAP50: ${eval_results.mAP50}
            prod_mAP50: ${prod_eval_results.mAP50}

    # -------------------------------------------------------------------------
    # Step 5: Model promotion
    # -------------------------------------------------------------------------
    - promote_model:
        call: http.post
        args:
          url: ${"https://storage.googleapis.com/storage/v1/b/" + model_bucket + "/o/runs%2F" + run_id + "%2Ffish-id.onnx/rewriteTo/b/" + model_bucket + "/o/fish-id.onnx"}
          auth:
            type: OAuth2
          body: {}
        result: rewrite_response

    - get_promotion_timestamp:
        assign:
          - promotion_timestamp: ${sys.now()}

    - write_production_run_json:
        call: http.post
        args:
          url: ${"https://storage.googleapis.com/upload/storage/v1/b/" + model_bucket + "/o?uploadType=media&name=production-run.json"}
          auth:
            type: OAuth2
          headers:
            Content-Type: "application/json"
          body:
            run_id: ${run_id}
            promoted_at: ${promotion_timestamp}
            manual_override: false
        result: production_run_write_response

    # -------------------------------------------------------------------------
    # Step 6: Trigger GitHub Actions redeploy via workflow_dispatch
    # -------------------------------------------------------------------------
    - read_github_pat_secret:
        call: http.get
        args:
          url: ${"https://secretmanager.googleapis.com/v1/projects/" + project_id + "/secrets/github-deploy-pat/versions/latest:access"}
          auth:
            type: OAuth2
        result: pat_secret_response

    - decode_github_pat:
        assign:
          - github_pat: ${base64.decode(pat_secret_response.body.payload.data)}

    - trigger_github_redeploy:
        call: http.post
        args:
          url: "https://api.github.com/repos/briancorwin/fish-id/actions/workflows/deploy.yml/dispatches"
          headers:
            Authorization: ${"Bearer " + github_pat}
            Accept: "application/vnd.github+json"
            X-GitHub-Api-Version: "2022-11-28"
          body:
            ref: "main"
            inputs:
              run_id: ${run_id}
        result: github_dispatch_response

    - pipeline_complete:
        return:
          status: "success"
          run_id: ${run_id}
          dataset_version: ${dataset_version}
          mAP50: ${eval_results.mAP50}
          mAP50_95: ${eval_results.mAP50_95}
          promoted_at: ${promotion_timestamp}
